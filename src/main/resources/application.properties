# ========================
# APPLICATION CONFIG
# ========================
spring.application.name=bloodbank
server.port=8080

# ========================
# DATABASE CONFIG (MySQL)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/hospitalmanagement_db
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# JWT CONFIG
# ========================
app.jwt.secret=BloodBankSecretKey2024VeryLongSecureKeyForJWTSigning!@#$%
app.jwt.expiration=86400000

# ========================
# GOOGLE MAPS API
# ========================
google.maps.api.key=AIzaSyDhJ7YkGKTfZ0qLfg1X2SSNtwL6n2Ju3vo

# ========================
# FIREBASE CONFIG
# ========================
firebase.config.path=src/main/resources/firebase-service-account.json

# ========================
# LOGGING
# ========================
logging.level.com.bloodbank=DEBUG
logging.level.org.springframework.security=INFO

# ========================
# JACKSON
# ========================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Kolkata
