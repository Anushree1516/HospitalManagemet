spring.application.name=bloodbank
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:jeutxXBhelQSppyzfbmkbYGSkzTupWdw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:BloodBankSecretKey2024}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

firebase.config.path=src/main/resources/firebase-service-account.json

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.security.enabled=false

logging.level.com.bloodbank=INFO
logging.level.org.springframework.security=WARN

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Kolkata

